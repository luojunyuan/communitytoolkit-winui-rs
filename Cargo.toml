[package]
name = "xamltoolkit-rs"
version = "0.1.0"
edition = "2021"
publish = false
build = "build.rs"

[workspace]
members = [
    "crates/xamltoolkit-winui",
    "crates/xamltoolkit-winui-converters",
    "crates/xamltoolkit-winui-controls",
    "crates/xamltoolkit-winui-helpers",
]
resolver = "2"

[dependencies]
xamltoolkit-winui-controls = { path = "crates/xamltoolkit-winui-controls" }
windows = { version = "0.62.2", features = ["Foundation", "UI"] }
windows-collections = "0.3.2"
windows-core = "0.62.2"
windows-reactor = { path = "../windows-rs-62af965-patched/crates/libs/reactor" }

[build-dependencies]
windows-reactor-setup = { path = "../windows-rs-62af965-patched/crates/libs/reactor-setup" }

[[example]]
name = "controls"
path = "examples/controls.rs"

[patch.crates-io]
windows = { path = "../windows-rs-62af965-patched/crates/libs/windows" }
windows-bindgen = { path = "../windows-rs-62af965-patched/crates/libs/bindgen" }
windows-collections = { path = "../windows-rs-62af965-patched/crates/libs/collections" }
windows-core = { path = "../windows-rs-62af965-patched/crates/libs/core" }
windows-future = { path = "../windows-rs-62af965-patched/crates/libs/future" }
windows-implement = { path = "../windows-rs-62af965-patched/crates/libs/implement" }
windows-interface = { path = "../windows-rs-62af965-patched/crates/libs/interface" }
windows-link = { path = "../windows-rs-62af965-patched/crates/libs/link" }
windows-numerics = { path = "../windows-rs-62af965-patched/crates/libs/numerics" }
windows-reference = { path = "../windows-rs-62af965-patched/crates/libs/reference" }
windows-result = { path = "../windows-rs-62af965-patched/crates/libs/result" }
windows-strings = { path = "../windows-rs-62af965-patched/crates/libs/strings" }
windows-threading = { path = "../windows-rs-62af965-patched/crates/libs/threading" }
windows-time = { path = "../windows-rs-62af965-patched/crates/libs/time" }
